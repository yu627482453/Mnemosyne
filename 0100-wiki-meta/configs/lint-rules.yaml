# 健康检查规则 — 可自动修复项与需人工确认项

auto_fix:
  - rule: broken_wikilink
    description: "内部 [[wikilink]] 指向不存在"
    action: "标记为注释 <!-- BROKEN: ... -->"

manual_review:
  - rule: orphan_page
    description: "无任何 incoming wikilink 的页面"
  - rule: long_draft
    description: "status=draft 超过 30 天"
  - rule: missing_cross_ref
    description: "可能遗漏的跨主题引用建议"
  - rule: incomplete_frontmatter
    description: "必填字段缺失（按 schema.yaml 校验）"
  - rule: l2_missing_body
    description: "L2 缺少核心提炼区或原文笔记区"
  - rule: summary_out_of_range
    description: "summary 不在 200 字以上"
  - rule: summary_missing
    description: "summary 字段缺失或为空"
  - rule: tags_format
    description: "tags 含空格或未使用连字符"
  - rule: filename_format
    description: "文件名含空格或主体中使用了 . 作为分隔符"
  - rule: resource_refs_consistency
    description: "resource_refs 与正文 ![[...]] 引用不一致或 topic 不匹配"
  - rule: remote_image_residual
    description: "正文中仍存在远程图片 URL"
  - rule: l3_source_stale
    description: "L3 source 引用失效或 L3 未覆盖同 slug 新 L2"
  - rule: l3_independent_fact
    description: "L3 存在未被 source L2 覆盖的事实陈述"
  - rule: content_hash_mismatch
    description: "L2 content_hash 与实际文件不一致"
  - rule: planned_links_missing
    description: "L2 wikilink 指向不存在的页面"
  - rule: l3_missing_processing_path
    description: "L3 页面缺少 processing_path"
  - rule: tag_not_in_vocabulary
    description: "页面使用了未登记的标签"
  - rule: base_column_invalid
    description: "Base panel 引用了当前 layer 不存在的字段"
  - rule: topic_not_in_active
    description: "L2 的 topic 未注册到 topics.yaml 对应 domain 的 active 列表"
  - rule: topic_missing_summary_page
    description: "active topic 缺少 0101-wiki-topics 域级综述页"
