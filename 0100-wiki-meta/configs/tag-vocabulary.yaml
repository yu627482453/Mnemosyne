# 受控标签词表 — 新增标签需在此登记

# === 分类说明 ===
# Agent        — 智能体核心概念、类型、机制、工具
# LLM          — 大语言模型架构、训练、增强、编排
# RAG          — 检索增强生成
# ML           — 通用机器学习
# Workflow     — 工作流模式与编排
# Performance  — 并行与性能优化
# Quality      — 质量保障、评估、改进
# Architecture — 系统架构与设计模式
# Organization — 组织/公司实体
# Product      — 产品实体
# Project      — 项目/基准实体

tag_rules:
  min_per_page: 5
  max_per_page: 10
  new_tag_requires_confirmation: true
  prefer_existing: true
  naming_convention: "tag_en 为英文 slug（多词连字符），tag_zh 为中文译名；aliases 收录中英文别名"
