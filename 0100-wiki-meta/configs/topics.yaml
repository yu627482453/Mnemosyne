# 主题目录映射

domains:
  个人生活:
    range: [1000, 2999]
    default_tags: [个人管理, 生活]
    active: []

  AI技术:
    range: [3000, 3999]
    default_tags: [AI, 机器学习]
    active:
      - 3000-Agent
      - 3001-RAG与检索

  工作业务:
    range: [4000, 4999]
    default_tags: [工作, 生产力]
    active: []

  通用基础:
    range: [5000, 9999]
    default_tags: [基础知识]
    active: []

topic_creation:
  id_format: "{4位编号}-{显示名}"
  naming_rule: "技术缩写、产品名、标准英文名可保留英文；中文领域使用中文；禁止空格"
  id_rule: "同千位已有目录取最大编号 +1"
  notify_user: true
