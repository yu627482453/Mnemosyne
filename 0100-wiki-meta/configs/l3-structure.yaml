# L3 概念目录子分类规范

agent:
  core:
    description: "核心机制（Agent 运行的基础组件）"
    examples: [agent-loop, agent-memory, agent-state, planning-module]
    criteria: "定义 Agent 如何工作的底层机制"

  frameworks:
    description: "框架范式（完整的 Agent 设计模式）"
    examples: [react, rewoo, reflexion, tree-of-thoughts, chain-of-thought]
    criteria: "可直接应用的完整方法论或算法框架"

  applications:
    description: "应用场景（特定领域的 Agent 实现）"
    examples: [code-agent, research-agent, data-agent, qa-agent]
    criteria: "针对具体任务的 Agent 应用"

  techniques:
    description: "技术细节（优化与工程实践）"
    examples: [prompt-template, error-handling, retry-strategy, token-optimization]
    criteria: "提升 Agent 性能或可靠性的具体技术"

rag:
  core:
    description: "核心概念（RAG 的基础组件）"
    examples: [retrieval, embedding, indexing, chunking]
    criteria: "RAG 系统必需的基本概念"

  techniques:
    description: "优化技术（提升检索质量）"
    examples: [reranking, hybrid-search, query-expansion, metadata-filtering]
    criteria: "改进检索效果的方法"

  applications:
    description: "应用场景"
    examples: [qa-system, document-search, knowledge-base]
    criteria: "RAG 的具体应用形式"

llm-basics:
  architecture:
    description: "模型架构"
    examples: [transformer, attention, tokenization, embedding]
    criteria: "LLM 的结构性组件"

  training:
    description: "训练技术"
    examples: [pre-training, fine-tuning, rlhf, instruction-tuning]
    criteria: "如何训练 LLM"

  inference:
    description: "推理优化"
    examples: [quantization, caching, batching, kv-cache]
    criteria: "提升推理效率的技术"

model-training:
  techniques:
    description: "训练方法"
    examples: [supervised-learning, reinforcement-learning, self-supervised]
    criteria: "训练范式"

  optimization:
    description: "优化策略"
    examples: [learning-rate-schedule, regularization, gradient-clipping]
    criteria: "训练过程的优化技巧"

image-generation:
  models:
    description: "生成模型"
    examples: [diffusion-model, gan, vae, flow-model]
    criteria: "图像生成的模型架构"

  techniques:
    description: "技术细节"
    examples: [conditioning, sampling, guidance, inpainting]
    criteria: "控制生成过程的技术"

ai-engineering:
  deployment:
    description: "部署相关"
    examples: [serving, scaling, monitoring, api-design]
    criteria: "将 AI 系统部署到生产环境"

  tools:
    description: "工具链"
    examples: [langchain, llamaindex, openai-api, vector-database]
    criteria: "AI 开发的框架和工具"
