# Frontmatter Schema — 机器可校验字段规范
# Claude 执行 Ingest/Update/Lint 时的校验依据

common_required:
  title: { type: string, max_len: 120 }
  updated: { type: date, format: YYYY-MM-DD }

layers:
  L1:
    fields:
      date:     { type: date, format: YYYY-MM-DD }
      source_url: { type: string }
      status:   { type: enum, values: [raw, processing, archived] }

  L2:
    fields:
      title:    { type: string, required: true, max_len: 120 }
      topic:    { type: string, required: true, pattern: "^\d{4}-.+$" }
      layer:    { type: enum, required: true, values: [L2] }
      id:      { type: string, required: true, description: "身份hash: SHA256(topic+slug+created)[:8]" }
      content_hash: { type: string, description: "内容hash: SHA256(正文内容，不含frontmatter)[:8]" }
      kind:     { type: enum, required: true, values: [standard] }
      tags:     { type: list, min: 5, max: 10, no_spaces: true }
      aliases:  { type: list, min: 1 }
      created:  { type: date, required: true, format: YYYY-MM-DD }
      updated:  { type: date, required: true, format: YYYY-MM-DD }
      source:   { type: enum, required: true, values: [manual, url, file, claude] }
      source_url: { type: string }
      planned_links: { type: list, description: "待建概念的 wikilink 目标列表" }
      resource_refs: { type: list, description: "本地资源路径列表" }
      failed_images: { type: list, description: "下载失败的图片 URL 列表" }
      confidence: { type: number, min: 0.8, max: 1.0, description: "知识置信度" }
      provenance: { type: object, description: "来源比例：extracted/inferred/ambiguous，三者和≈1.0" }
      status:   { type: enum, required: true, values: [draft, published] }
      summary:  { type: string, required: true, min_len: 200 }

  L3:
    fields:
      title:    { type: string, required: true, max_len: 120 }
      layer:    { type: enum, required: true, values: [L3] }
      kind:     { type: enum, required: true, values: [topic, concept, entity, comparison] }
      processing_path: { type: string, required: true, pattern: "^\\S+/\\S+$" }
      updated:  { type: date, required: true, format: YYYY-MM-DD }
      source: { type: list, min: 1, description: "L2 源文件相对路径列表" }
      entity_type: { type: enum, values: [Organization, Product, Project, Paper, Person] }
      comparison_axis: { type: string }
      lhs: { type: string }
      rhs: { type: string }
      tags:     { type: list, min: 5, max: 10, no_spaces: true }
      confidence: { type: number, min: 0.6, max: 1.0, description: "知识置信度" }
      provenance: { type: object, description: "来源比例：extracted/inferred/ambiguous，三者和≈1.0" }
      relationships: { type: list, description: "类型化关系列表：[{target: '[[slug]]', type: 'extends'}]" }
      status:   { type: enum, values: [draft, published] }
      summary:  { type: string, required: true, min_len: 200 }
